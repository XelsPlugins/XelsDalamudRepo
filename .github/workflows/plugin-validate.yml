name: Plugin Validate

on:
  workflow_call:
    inputs:
      plugin_project_path:
        required: true
        type: string
      dotnet_version:
        required: true
        type: string
      internal_name:
        required: false
        type: string
        default: ""
      dalamud_distribution:
        required: false
        type: string
        default: stable
      automation_ref:
        required: false
        type: string
        default: main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DALAMUD_HOME: /tmp/dalamud
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Checkout feed automation
        uses: actions/checkout@v4
        with:
          repository: XelsPlugins/XelsDalamudRepo
          ref: ${{ inputs.automation_ref }}
          path: .xels-repo

      - name: Validate pushed commit messages
        if: github.event_name == 'push'
        shell: bash
        run: |
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [[ "$before" =~ ^0+$ ]]; then
            python .xels-repo/scripts/validate-commit-messages.py
          elif git rev-parse --verify --quiet "${before}^{commit}" >/dev/null; then
            python .xels-repo/scripts/validate-commit-messages.py --range "${before}..HEAD"
          elif git rev-parse --verify --quiet "HEAD^" >/dev/null; then
            echo "::warning::Push before commit $before is unavailable in this checkout; validating the HEAD commit only."
            python .xels-repo/scripts/validate-commit-messages.py --range "HEAD^..HEAD"
          else
            echo "::warning::Push before commit $before is unavailable in this checkout; validating all reachable commits from HEAD."
            python .xels-repo/scripts/validate-commit-messages.py
          fi

      - name: Detect ECommons reference
        id: ecommons
        shell: bash
        run: |
          if grep -q "ECommons" "${{ inputs.plugin_project_path }}"; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout ECommons
        if: steps.ecommons.outputs.needed == 'true'
        uses: actions/checkout@v4
        with:
          repository: NightmareXIV/ECommons
          path: external/ECommons

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Download Dalamud
        shell: bash
        env:
          DALAMUD_DISTRIBUTION: ${{ inputs.dalamud_distribution }}
        run: |
          mkdir -p "$DALAMUD_HOME"
          case "$DALAMUD_DISTRIBUTION" in
            stable)
              dalamud_url="https://goatcorp.github.io/dalamud-distrib/latest.zip"
              ;;
            stg|staging)
              dalamud_url="https://goatcorp.github.io/dalamud-distrib/stg/latest.zip"
              ;;
            canary)
              dalamud_url="https://goatcorp.github.io/dalamud-distrib/canary/latest.zip"
              ;;
            http://*|https://*)
              dalamud_url="$DALAMUD_DISTRIBUTION"
              ;;
            *)
              echo "Unsupported Dalamud distribution: $DALAMUD_DISTRIBUTION"
              echo "Use stable, stg, canary, or a direct latest.zip URL."
              exit 1
              ;;
          esac
          curl -fsSL "$dalamud_url" -o /tmp/dalamud.zip
          unzip -q -o /tmp/dalamud.zip -d "$DALAMUD_HOME"

      - name: Restore
        run: dotnet restore "${{ inputs.plugin_project_path }}" -p:EnableWindowsTargeting=true

      - name: Build Debug
        run: dotnet build "${{ inputs.plugin_project_path }}" -c Debug -p:EnableWindowsTargeting=true --no-restore

      - name: Build Release
        run: dotnet build "${{ inputs.plugin_project_path }}" -c Release -p:EnableWindowsTargeting=true --no-restore

      - name: Run test projects when available
        shell: bash
        run: |
          mapfile -t tests < <(find . -name '*Tests.csproj' -not -path '*/bin/*' -not -path '*/obj/*' | sort)
          if [ "${#tests[@]}" -eq 0 ]; then
            echo "No test projects found."
            exit 0
          fi

          for test_project in "${tests[@]}"; do
            if grep -q "Microsoft.NET.Test.Sdk" "$test_project"; then
              dotnet test "$test_project" -c Release -p:EnableWindowsTargeting=true --no-restore
            else
              echo "Skipping custom non-dotnet-test harness: $test_project"
            fi
          done

      - name: Verify package output
        run: |
          python .xels-repo/scripts/package-plugin.py \
            --project "${{ inputs.plugin_project_path }}" \
            --configuration Release \
            --internal-name "${{ inputs.internal_name }}" \
            --no-build
