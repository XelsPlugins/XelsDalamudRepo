name: Update Pluginmaster

on:
  workflow_dispatch:
  schedule:
    - cron: "37 4 * * *"
  push:
    paths:
      - repos.txt
      - scripts/**

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild pluginmaster
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/update-pluginmaster.py

      - name: Validate JSON
        run: python -m json.tool pluginmaster.json >/dev/null

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet -- pluginmaster.json; then
            echo "No pluginmaster changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git commit -m "chore: update pluginmaster"
          git push
