name: Plugin Release

on:
  workflow_call:
    inputs:
      plugin_project_path:
        required: true
        type: string
      feed_repo:
        required: true
        type: string
      release_type:
        required: true
        type: string
      dry_run:
        required: true
        type: boolean
      dotnet_version:
        required: true
        type: string
      internal_name:
        required: false
        type: string
        default: ""
      dalamud_distribution:
        required: false
        type: string
        default: stable
      automation_ref:
        required: false
        type: string
        default: main
    secrets:
      feed_token:
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DALAMUD_HOME: /tmp/dalamud
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Checkout feed automation
        uses: actions/checkout@v4
        with:
          repository: XelsPlugins/XelsDalamudRepo
          ref: ${{ inputs.automation_ref }}
          path: .xels-repo

      - name: Detect ECommons reference
        id: ecommons
        shell: bash
        run: |
          if grep -q "ECommons" "${{ inputs.plugin_project_path }}"; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout ECommons
        if: steps.ecommons.outputs.needed == 'true'
        uses: actions/checkout@v4
        with:
          repository: NightmareXIV/ECommons
          path: external/ECommons

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Download Dalamud
        shell: bash
        env:
          DALAMUD_DISTRIBUTION: ${{ inputs.dalamud_distribution }}
        run: |
          mkdir -p "$DALAMUD_HOME"
          case "$DALAMUD_DISTRIBUTION" in
            stable)
              dalamud_url="https://goatcorp.github.io/dalamud-distrib/latest.zip"
              ;;
            stg|staging)
              dalamud_url="https://goatcorp.github.io/dalamud-distrib/stg/latest.zip"
              ;;
            canary)
              dalamud_url="https://goatcorp.github.io/dalamud-distrib/canary/latest.zip"
              ;;
            http://*|https://*)
              dalamud_url="$DALAMUD_DISTRIBUTION"
              ;;
            *)
              echo "Unsupported Dalamud distribution: $DALAMUD_DISTRIBUTION"
              echo "Use stable, stg, canary, or a direct latest.zip URL."
              exit 1
              ;;
          esac
          curl -fsSL "$dalamud_url" -o /tmp/dalamud.zip
          unzip -q -o /tmp/dalamud.zip -d "$DALAMUD_HOME"

      - name: Calculate release version
        id: version
        run: |
          python .xels-repo/scripts/calculate-version.py \
            --mode release \
            --release-type "${{ inputs.release_type }}"

      - name: Skip when auto release has no user-facing bump
        if: steps.version.outputs.should_release != 'true'
        run: |
          echo "No user-facing release bump was detected; skipping release."

      - name: Validate release commit messages
        if: steps.version.outputs.should_release == 'true'
        run: |
          python .xels-repo/scripts/validate-commit-messages.py \
            --from-ref "${{ steps.version.outputs.notes_from_ref }}"

      - name: Refuse existing stable tag or release
        if: steps.version.outputs.should_release == 'true' && inputs.dry_run != true
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag already exists: $tag"
            exit 1
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release already exists: $tag"
            exit 1
          fi

      - name: Build stable package
        if: steps.version.outputs.should_release == 'true'
        run: |
          dotnet restore "${{ inputs.plugin_project_path }}" -p:EnableWindowsTargeting=true
          dotnet build "${{ inputs.plugin_project_path }}" -c Release -p:EnableWindowsTargeting=true -p:Version=${{ steps.version.outputs.assembly_version }} -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }} -p:InformationalVersion=${{ steps.version.outputs.assembly_version }} --no-restore
          python .xels-repo/scripts/package-plugin.py \
            --project "${{ inputs.plugin_project_path }}" \
            --configuration Release \
            --internal-name "${{ inputs.internal_name }}" \
            --version "${{ steps.version.outputs.assembly_version }}" \
            --no-build

      - name: Generate release notes
        if: steps.version.outputs.should_release == 'true'
        run: |
          python .xels-repo/scripts/generate-release-notes.py \
            --from-ref "${{ steps.version.outputs.notes_from_ref }}" \
            --output artifacts/release-notes.md

      - name: Dry run summary
        if: steps.version.outputs.should_release == 'true' && inputs.dry_run == true
        run: |
          echo "Dry run only."
          echo "Tag: ${{ steps.version.outputs.tag }}"
          echo "AssemblyVersion: ${{ steps.version.outputs.assembly_version }}"
          ls -la artifacts

      - name: Publish stable release
        if: steps.version.outputs.should_release == 'true' && inputs.dry_run != true
        id: release
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          internal_name="$(find artifacts -maxdepth 1 -name '*.zip' -printf '%f\n' | sed 's/\.zip$//' | head -n1)"
          zip_path="artifacts/${internal_name}.zip"
          manifest_path="artifacts/${internal_name}.json"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$tag" "$GITHUB_SHA"
          git push origin "refs/tags/${tag}"
          gh release create "$tag" "$zip_path" "$manifest_path" \
            --title "$tag" \
            --notes-file artifacts/release-notes.md

          echo "internal_name=${internal_name}" >> "$GITHUB_OUTPUT"
          echo "download_url=https://github.com/${{ github.repository }}/releases/download/${tag}/${internal_name}.zip" >> "$GITHUB_OUTPUT"

      - name: Update stable feed fields
        if: steps.version.outputs.should_release == 'true' && inputs.dry_run != true
        env:
          FEED_TOKEN: ${{ secrets.feed_token }}
        shell: bash
        run: |
          git clone "https://x-access-token:${FEED_TOKEN}@github.com/${{ inputs.feed_repo }}.git" feed
          python .xels-repo/scripts/update-feed-entry.py \
            --feed-repo-dir feed \
            --mode stable \
            --manifest "artifacts/${{ steps.release.outputs.internal_name }}.json" \
            --download-url "${{ steps.release.outputs.download_url }}" \
            --assembly-version "${{ steps.version.outputs.assembly_version }}" \
            --repo-url "https://github.com/${{ github.repository }}" \
            --clear-testing

          cd feed
          if git diff --quiet -- pluginmaster.json; then
            echo "No feed changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git commit -m "chore: update ${{ steps.release.outputs.internal_name }} stable feed"
          git push
